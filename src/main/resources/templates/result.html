<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Indian Railway PNR Status</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
    background:linear-gradient(135deg,#dbeafe,#eff6ff,#bfdbfe);
    background-attachment:fixed;
    font-family:Arial,Helvetica,sans-serif;
    min-height:100vh;
}

.container{
    max-width:650px;
    margin:auto;
    padding:15px;
}

.train-card{
    background:linear-gradient(135deg,#1565C0,#0D47A1);
    color:white;
    border-radius:20px;
    padding:18px;
    box-shadow:0 8px 20px rgba(0,0,0,.18);
}

.train-title{
    font-size:24px;
    font-weight:bold;
}

.station{
    font-size:18px;
    font-weight:bold;
}

.section-title{
    color:#0D47A1;
    font-weight:bold;
    margin-top:18px;
    margin-bottom:10px;
}

.passenger-card{
    margin-top:12px;
    border:none;
    border-radius:16px;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,.12);
}

.card-body{
    padding:14px;
}

.seat{
    display:inline-block;
    background:#E8F5E9;
    color:#2E7D32;
    padding:4px 8px;
    border-radius:8px;
    font-size:13px;
    font-weight:bold;
}

.confirmed{
    background:#2E7D32;
    color:white;
    padding:4px 10px;
    border-radius:15px;
    font-size:13px;
    font-weight:bold;
}

.rac{
    background:#0288D1;
    color:white;
    padding:4px 10px;
    border-radius:15px;
    font-size:13px;
    font-weight:bold;
}

.waiting{
    background:#D32F2F;
    color:white;
    padding:4px 10px;
    border-radius:15px;
    font-size:13px;
    font-weight:bold;
}

.info-card{
    border:none;
    border-radius:14px;
    box-shadow:0 2px 8px rgba(0,0,0,.12);
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#555;
}

.btn-primary{
    border-radius:12px;
    font-weight:bold;
    padding:12px;
}

@media(max-width:576px){

.container{
padding:10px;
}

.train-title{
font-size:20px;
}

.station{
font-size:15px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="train-card">

<div class="train-title">
<i class="fa-solid fa-train"></i>
<span th:text="${response.trainNo}"></span>
-
<span th:text="${response.trainName}"></span>
</div>

<hr style="border-color:white;">

<div class="row text-center">

<div class="col-5">

<div class="station" th:text="${response.source}"></div>

<small>From</small>

</div>

<div class="col-2 d-flex align-items-center justify-content-center">

<h3><i class="fa-solid fa-arrow-right"></i></h3>

</div>

<div class="col-5">

<div class="station" th:text="${response.destination}"></div>

<small>To</small>

</div>

</div>

<hr style="border-color:white;">
<div class="row text-center">

    <div class="col-6">

        <b>
            <i class="fa-regular fa-calendar"></i>
            Journey
        </b>

        <br>

        <span th:text="${response.journeyDate}"></span>

    </div>

    <div class="col-6">

        <b>
            <i class="fa-solid fa-ticket"></i>
            Class
        </b>

        <br>

        <span th:text="${response.travelClass}"></span>

    </div>

</div>

<div class="row text-center mt-3">

    <div class="col-6">

        <b>
            <i class="fa-solid fa-barcode"></i>
            PNR
        </b>

        <br>

        <span th:text="${response.pnr}"></span>

    </div>

    <div class="col-6">

        <b>
            <i class="fa-solid fa-list"></i>
            Quota
        </b>

        <br>

        <span th:text="${response.quota}"></span>

    </div>

</div>

<div class="row text-center mt-3">

    <div class="col-6">

        <b>
            <i class="fa-solid fa-location-dot"></i>
            Boarding
        </b>

        <br>

        <span th:text="${response.boardingPoint}"></span>

    </div>

    <div class="col-6">

        <b>
            <i class="fa-solid fa-chart-line"></i>
            Chart
        </b>

        <br>

        <span class="confirmed"
              th:if="${response.chartPrepared=='Yes'}">
            Prepared
        </span>

        <span class="waiting"
              th:unless="${response.chartPrepared=='Yes'}">
            Not Prepared
        </span>

    </div>

</div>

<div class="row text-center mt-3">

    <div class="col-6">

        <b>
            <i class="fa-solid fa-indian-rupee-sign"></i>
            Fare
        </b>

        <br>

        <span th:text="${response.bookingFare}"></span>

    </div>

    <div class="col-6">

        <b>
            <i class="fa-solid fa-route"></i>
            Distance
        </b>

        <br>

        <span th:text="${response.distance}"></span> km

    </div>

</div>

</div>

<h4 class="section-title">

<i class="fa-solid fa-users"></i>

Passenger Details

</h4>

<div class="card info-card">

<div class="table-responsive">

<table class="table table-bordered table-hover mb-0 text-center align-middle">

<thead style="background:#1565C0;color:white;">

<tr>

<th>S.No.</th>
<th>Booking Status</th>
<th>Current Status</th>
<th>Seat / Berth</th>
<th>Booking Date</th>
</tr>

</thead>

<tbody>

<tr th:each="p : ${response.passengers}">
<td>
    <span th:text="${p.passengerNo}"></span>
</td>

<td>
    <span th:text="${p.bookingStatus}"></span>
</td>

<td>

    <span class="confirmed"
          th:if="${#strings.startsWith(p.currentStatus,'CNF')}"
          th:text="${p.currentStatus}">
    </span>

    <span class="rac"
          th:if="${#strings.startsWith(p.currentStatus,'RAC')}"
          th:text="${p.currentStatus}">
    </span>

    <span class="waiting"
          th:if="${!#strings.startsWith(p.currentStatus,'CNF') and !#strings.startsWith(p.currentStatus,'RAC')}"
          th:text="${p.currentStatus}">
    </span>

</td>

<td>

    <span class="seat"
          th:if="${#strings.startsWith(p.currentStatus,'CNF')}"
          th:text="${p.berth}">
    </span>

    <span style="color:red;font-weight:bold;"
          th:unless="${#strings.startsWith(p.currentStatus,'CNF')}">
        Not Allotted
    </span>

</td>
<td th:text="${response.bookingDate}"></td>
</tr>

</tbody>

</table>

</div>

</div>

<div class="d-grid mt-4 mb-3">

<form th:action="@{/}" method="get">

<button class="btn btn-primary btn-lg" type="submit">

<i class="fa-solid fa-magnifying-glass"></i>

Check Another PNR

</button>

</form>

</div>

<div class="footer">

<hr>

<h5 style="color:#0D47A1;font-weight:bold;">

<i class="fa-solid fa-train"></i>

Indian Railway PNR Checker

</h5>

<p style="margin-bottom:5px;">

Designed & Developed by

<b style="color:#1565C0;">Farhan Khan</b>

</p>

<small style="color:#666;">

Spring Boot • Thymeleaf • Bootstrap • RapidAPI

</small>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
